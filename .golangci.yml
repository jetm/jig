version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - wrapcheck
    - testifylint

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  wrapcheck:
    ignoreSigs: ["fmt.Errorf("]

issues:
  exclude-rules:
    - path: _test\.go
      linters: [wrapcheck]
