linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocritic
    - revive
    - wrapcheck
    - testifylint

linters-settings:
  wrapcheck:
    ignoreSigs: ["fmt.Errorf("]

issues:
  exclude-rules:
    - path: _test\.go
      linters: [wrapcheck]
